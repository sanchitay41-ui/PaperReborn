<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Notes - PaperReborn</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6f9;
}

/* Header */

header{
background:#2c3e50;
color:white;
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* Form Section */

.container{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
}

.form-box{
background:white;
padding:35px;
width:400px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form-box h2{
text-align:center;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

.form-group input,
.form-group textarea,
.form-group select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
resize:none;
height:80px;
}

.submit-btn{
width:100%;
padding:12px;
background:#27ae60;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.submit-btn:hover{
background:#219150;
}

footer{
background:#2c3e50;
color:white;
text-align:center;
padding:10px;
position:fixed;
bottom:0;
width:100%;
}

</style>

</head>

<body>

<header>

<div class="logo">PaperReborn</div>

<nav>
<a href="index.html">Home</a>
<a href="#">Browse Books</a>
<a href="#">Sell Notes</a>
<a href="#">Login</a>
</nav>

</header>

<div class="container">

<div class="form-box">

<h2>Sell Your Notes</h2>

<form id="bookForm">

<div class="form-group">
<label>Book / Notes Title</label>
<input type="text" id="title" placeholder="Enter title">
</div>

<div class="form-group">
<label>Subject</label>
<input type="text" id="subject" placeholder="Example: DBMS">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="description" placeholder="Write details about notes or book"></textarea>
</div>

<div class="form-group">
<label>Price (₹)</label>
<input type="number" id="price" placeholder="Enter price">
</div>


<div class="form-group">
<label>Contact Information</label>
<input type="text" id="contact" placeholder="Phone / Email">
</div>

<button class="submit-btn">Post Listing</button>

</form>

</div>

</div>

<footer>
© 2026 PaperReborn | Student Marketplace
</footer>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 CONFIG
const firebaseConfig = {  
  apiKey: "AIzaSyCATZmWjriZ0mkeLUh6_TWanlo0qniJf4I",  
  authDomain: "paperreborn-75d32.firebaseapp.com",  
  projectId: "paperreborn-75d32",  
  storageBucket: "paperreborn-75d32.firebasestorage.app",  
  messagingSenderId: "36968794736",  
  appId: "1:36968794736:web:52c0fb727d61bfcc0482b5",  
  measurementId: "G-JZ5L1C2VPK"  
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔒 PROTECT PAGE
onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Please login first!");
    window.location.href = "login.html";
  }
});

// ================= SUBMIT =================
document.getElementById("bookForm").addEventListener("submit", async function(e){

  e.preventDefault();

  let title = document.getElementById("title").value;
  let subject = document.getElementById("subject").value;
  let price = document.getElementById("price").value;
  let contact = document.getElementById("contact").value;
  let description = document.getElementById("description").value

  await addDoc(collection(db, "books"), {
    title,
    subject,
    description,
    price,
    contact,
    sold: false,
    user: auth.currentUser?.email || "unknown"
  });

  alert("Listing Posted!");
  window.location.href = "thankyou.html";

});

</script>
