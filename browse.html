<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Books - PaperReborn</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* Header */

header{
background:#2c3e50;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* Search Section */

.search-section{
text-align:center;
padding:30px;
background:white;
}

.search-section input{
padding:10px;
width:250px;
border:1px solid #ccc;
border-radius:5px;
}

.search-section select{
padding:10px;
border-radius:5px;
margin-left:10px;
}

.search-section button{
padding:10px 15px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-left:10px;
}

/* Grid Layout */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
}

/* Book Card */

.card{
background:white;
border-radius:8px;
padding:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:5px;
}

.card h3{
margin:10px 0 5px;
}

.subject{
font-size:14px;
color:#666;
}

.price{
color:#27ae60;
font-weight:bold;
margin:8px 0;
}

.btn{
background:#3498db;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>PaperReborn</h2>

<nav>
<a href="index.html">Home</a>
<a href="browse.html">Browse Books</a>
<a href="sell.html">Sell Notes</a>
</nav>

</header>

<div class="search-section">

<h2>Find Study Notes & Books</h2>

<input type="text" id="searchInput" placeholder="Search subject or book">


<button onclick="searchBooks()">Search</button>

</div>

<div class="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR CONFIG (already added)
const firebaseConfig = {  
  apiKey: "AIzaSyCATZmWjriZ0mkeLUh6_TWanlo0qniJf4I",  
  authDomain: "paperreborn-75d32.firebaseapp.com",  
  projectId: "paperreborn-75d32",  
  storageBucket: "paperreborn-75d32.firebasestorage.app",  
  messagingSenderId: "36968794736",  
  appId: "1:36968794736:web:52c0fb727d61bfcc0482b5",  
  measurementId: "G-JZ5L1C2VPK"  
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const container = document.querySelector(".grid");

// ================= DISPLAY =================
async function displayBooks() {
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "books"));

  querySnapshot.forEach((docSnap) => {
    const book = docSnap.data();

    let card = document.createElement("div");
    card.classList.add("card");

    const currentUser = auth.currentUser?.email;

    card.innerHTML = `
  <h3>${book.title}</h3>
  <p><b>Subject:</b> ${book.subject}</p>
  <p><b>Description:</b> ${book.description || "No description"}</p>
  <div class="price">₹${book.price}</div>

  ${book.sold ? "<p style='color:red;font-weight:bold;'>SOLD</p>" : ""}

  <button onclick="alert('Contact: ${book.contact}')">
    Contact Seller
  </button>

  ${
  book.user === currentUser ? `
    <button onclick="markSold('${docSnap.id}')" style="background:orange;color:white;margin-top:5px;">
      Mark as Sold
    </button>

    <button onclick="deleteBook('${docSnap.id}')" style="background:red;color:white;margin-top:5px;">
      Delete
    </button>
  ` : ""
}
`;

    container.appendChild(card);
  });
}

// ================= DELETE =================
window.deleteBook = async function(id) {
  await deleteDoc(doc(db, "books", id));
  displayBooks();
};

displayBooks();
window.markSold = async function(id) {
  await updateDoc(doc(db, "books", id), {
    sold: true
  });
  displayBooks();
};
window.searchBooks = async function(){

  let input = document.getElementById("searchInput").value.toLowerCase();

  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "books"));

  querySnapshot.forEach((docSnap) => {
    const book = docSnap.data();

    if(
      book.title.toLowerCase().includes(input) ||
      (book.description && book.description.toLowerCase().includes(input))
    ){
      let card = document.createElement("div");
      card.classList.add("card");

      card.innerHTML = `
        <h3>${book.title}</h3>
        <p><b>Description:</b> ${book.description || "No description"}</p>
        <div class="price">₹${book.price}</div>

        ${book.sold ? "<p style='color:red;'>SOLD</p>" : ""}

        <button onclick="alert('Contact: ${book.contact}')">Contact Seller</button>
        <button onclick="markSold('${docSnap.id}')">Mark as Sold</button>
        <button onclick="deleteBook('${docSnap.id}')">Delete</button>
      `;

      container.appendChild(card);
    }

  });

};

</script>
</body>
</html>
