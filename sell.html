<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Notes - PaperReborn</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6f9;
}

/* Header */

header{
background:#2c3e50;
color:white;
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* Form Section */

.container{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
}

.form-box{
background:white;
padding:35px;
width:400px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form-box h2{
text-align:center;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

.form-group input,
.form-group textarea,
.form-group select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
resize:none;
height:80px;
}

.submit-btn{
width:100%;
padding:12px;
background:#27ae60;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.submit-btn:hover{
background:#219150;
}

footer{
background:#2c3e50;
color:white;
text-align:center;
padding:10px;
position:fixed;
bottom:0;
width:100%;
}

</style>

</head>

<body>

<header>

<div class="logo">PaperReborn</div>

<nav>
<a href="index.html">Home</a>
<a href="#">Browse Books</a>
<a href="#">Sell Notes</a>
<a href="#">Login</a>
</nav>

</header>

<div class="container">

<div class="form-box">

<h2>Sell Your Notes</h2>

<form id="bookForm">

<div class="form-group">
<label>Book / Notes Title</label>
<input type="text" id="title" placeholder="Enter title">
</div>

<div class="form-group">
<label>Subject</label>
<input type="text" id="subject" placeholder="Example: DBMS">
</div>

<div class="form-group">
<label>Description</label>
<textarea placeholder="Write details about notes or book"></textarea>
</div>

<div class="form-group">
<label>Price (₹)</label>
<input type="number" id="price" placeholder="Enter price">
</div>

<div class="form-group">
<label>Upload Image</label>
<input type="file">
</div>

<div class="form-group">
<label>Contact Information</label>
<input type="text" id="contact" placeholder="Phone / Email">
</div>

<button class="submit-btn">Post Listing</button>

</form>

</div>

</div>

<footer>
© 2026 PaperReborn | Student Marketplace
</footer>
<script>

document.getElementById("bookForm").addEventListener("submit", function(e){

e.preventDefault();

let title = document.getElementById("title").value;
let subject = document.getElementById("subject").value;
let price = document.getElementById("price").value;
let contact = document.getElementById("contact").value;

let book = {
title: title,
subject: subject,
price: price,
contact: contact
};

let books = JSON.parse(localStorage.getItem("books")) || [];

books.push(book);

localStorage.setItem("books", JSON.stringify(books));

alert("Listing Posted!");

window.location.href="browse.html";

});

</script>

</body>
</html>
<script>
document.querySelector("form").addEventListener("submit", function(e){
e.preventDefault();
alert("Listing posted!");
window.location.href="browse.html";
});
</script>
