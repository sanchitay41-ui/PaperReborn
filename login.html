<!DOCTYPE html>
<html>
<head>
<title>Login - PaperReborn</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2c3e50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="email" id="username" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="margin-top:10px;">No account? <a href="signup.html">Signup</a></p>

</div>

<!-- 🔥 FIREBASE LOGIN SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {  
  apiKey: "AIzaSyCATZmWjriZ0mkeLUh6_TWanlo0qniJf4I",  
  authDomain: "paperreborn-75d32.firebaseapp.com",  
  projectId: "paperreborn-75d32",  
  storageBucket: "paperreborn-75d32.firebasestorage.app",  
  messagingSenderId: "36968794736",  
  appId: "1:36968794736:web:52c0fb727d61bfcc0482b5",  
  measurementId: "G-JZ5L1C2VPK"  
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

  let email = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login successful!");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert("Invalid login: " + error.message);
    });

};
</script>
</body>
</html>
